name: Daily Ingestion Scheduler

on:
  schedule:
    # Run daily at 03:45 UTC (9:15 AM IST)
    - cron: '45 3 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:
    # Allow manual execution via the Actions tab in GitHub
    inputs:
      force:
        description: 'Force fetching fresh content instead of using cache'
        type: boolean
        required: false
        default: false
      limit:
        description: 'Limit the number of schemes to process (for testing)'
        type: number
        required: false
      fast:
        description: 'Run crawler with minimal request delay (0.1s - 0.3s) for speed'
        type: boolean
        required: false
        default: true

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Cache Hugging Face models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: huggingface-models-cache
        restore-keys: |
          huggingface-models-cache

    - name: Cache Scraper & Parser Data
      uses: actions/cache@v4
      with:
        path: |
          data/raw
          data/processed
        key: groww-data-cache
        restore-keys: |
          groww-data-cache

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ingestion Script
      env:
        ENV: prod
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        CHROMA_DB_PATH: data/index/
        LOG_LEVEL: INFO
      run: |
        FLAGS="--fast"
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          FLAGS=""
          if [ "${{ github.event.inputs.fast }}" = "true" ]; then
            FLAGS="$FLAGS --fast"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FLAGS="$FLAGS --force"
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            FLAGS="$FLAGS --limit ${{ github.event.inputs.limit }}"
          fi
        fi
        
        # Execute daily.py with --now to run once and exit
        python scheduler/daily.py --now $FLAGS

    - name: Upload Ingestion Database Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RAG-MF-index-database
        path: data/
        if-no-files-found: error
        retention-days: 7
